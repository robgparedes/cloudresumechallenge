name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_acm_certificate_arn: ${{ vars.ACM_CERTIFICATE_ARN }}
      TF_VAR_frontend_origin_domain: ${{ vars.FRONTEND_ORIGIN_DOMAIN }}
      TF_VAR_frontend_origin_id: ${{ vars.FRONTEND_ORIGIN_ID }}
      TF_VAR_web_acl_arn: ${{ vars.WEB_ACL_ARN }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          pip install pytest requests

      - name: Run tests
        run: pytest
        working-directory: backend

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        working-directory: backend/terraform

      - name: Terraform Plan
        run: terraform plan
        working-directory: backend/terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: backend/terraform